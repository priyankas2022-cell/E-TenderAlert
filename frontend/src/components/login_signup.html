<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>e-Tender Alert | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fdecec;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      background: #fdecec;
      border-radius: 16px;
      overflow: hidden;
    }

    .form-box {
      flex: 1;
      padding: 50px;
    }

    .form-box h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .form-box p {
      color: #444;
      margin-bottom: 25px;
    }

    .google-btn {
      background: #ffb6c1;
      border: none;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      color: #777;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #ffb6c1;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .row a {
      color: #4b4ed6;
      text-decoration: none;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #4b4ed6;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .switch {
      margin-top: 20px;
      font-size: 14px;
    }

    .switch span {
      color: #4b4ed6;
      cursor: pointer;
    }

    .image-box {
      flex: 1;
      background: url('your-background.jpg') center/cover no-repeat; /* 👈 Add your image here */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .image-box {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="form-box">
    <h1 id="title">Login now</h1>
    <p id="subtitle">Hi, Welcome back 👋</p>

    <button class="google-btn" id="googleBtn">Continue with Google</button>

    <div class="divider">or Login with Email</div>

    <input type="email" id="email" placeholder="Enter your email" />
    <input type="password" id="password" placeholder="Enter your password" />

    <div class="row">
      <label><input type="checkbox" /> Remember Me</label>
      <a href="#">Forgot Password?</a>
    </div>

    <button class="submit-btn" id="submitBtn">Login</button>

    <div class="switch">
      Not registered yet? <span id="toggle">Create an account</span>
    </div>
  </div>

  <div class="image-box">
    <!-- Background image goes here -->
  </div>
</div>

<script>
  const toggle = document.getElementById("toggle");
  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const submitBtn = document.getElementById("submitBtn");
  const googleBtn = document.getElementById("googleBtn");

  let isLogin = true;

  toggle.onclick = () => {
    isLogin = !isLogin;

    if (!isLogin) {
      title.innerText = "Sign Up now";
      subtitle.innerText = "Create your account 🚀";
      submitBtn.innerText = "Sign Up";
      googleBtn.innerText = "Sign up with Google";
      toggle.innerText = "Already have an account?";
    } else {
      title.innerText = "Login now";
      subtitle.innerText = "Hi, Welcome back 👋";
      submitBtn.innerText = "Login";
      googleBtn.innerText = "Continue with Google";
      toggle.innerText = "Create an account";
    }
  };
</script>

</body>
</html>
